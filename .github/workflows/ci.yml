name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ===========================================================================
  # Python Linting & Type Checking
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-setuptools numpy

      - name: Run Ruff linter
        run: ruff check . --output-format=github
        continue-on-error: true  # Don't fail on style issues

      - name: Run Ruff formatter check
        run: ruff format --check .
        continue-on-error: true  # Don't fail on formatting issues

      - name: Run mypy type checker
        run: mypy --ignore-missing-imports *.py
        continue-on-error: true  # Type hints are advisory for this project

  # ===========================================================================
  # Python Unit Tests (No C++ required)
  # ===========================================================================
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python-only tests
        run: |
          python -m pytest \
            test_engine.py \
            test_engine_determinism.py \
            test_hot_reload.py \
            test_materials.py \
            test_physics.py \
            test_physics_3d.py \
            test_props.py \
            test_seed_registry.py \
            test_seed_sweeper.py \
            test_terrain.py \
            test_world.py \
            test_game_api.py \
            test_behavior_tree.py \
            test_player_controller.py \
            test_data_loader.py \
            test_game_runner.py \
            test_ui_system.py \
            test_graphics_bridge.py \
            -v --tb=short

  # ===========================================================================
  # C++ Build & Integration Tests (Linux)
  # ===========================================================================
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential cmake libssl-dev libvulkan-dev vulkan-validationlayers libshaderc-dev glslang-tools
          version: 1.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: linux-cmake-${{ hashFiles('cpp/**/*.cpp', 'cpp/**/*.h', 'cpp/CMakeLists.txt') }}
          restore-keys: |
            linux-cmake-

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --parallel $(nproc)

      - name: Copy module to project root
        run: |
          cp build/procengine_cpp*.so .

      - name: Run full test suite
        run: |
          python -m pytest \
            test_*.py \
            --ignore=test_cpp_graphics.py \
            -v --tb=short

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-linux-x64
          path: |
            build/procengine_cpp*.so
            cpp/
            *.py
            !test_*.py
            !conftest.py
            data/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7

  # ===========================================================================
  # C++ Build & Integration Tests (Windows)
  # ===========================================================================
  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Chocolatey packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Temp\chocolatey
          key: windows-choco-openssl-${{ runner.os }}
          restore-keys: |
            windows-choco-

      - name: Install OpenSSL
        run: |
          choco install openssl --no-progress

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-cmake-${{ hashFiles('cpp/**/*.cpp', 'cpp/**/*.h', 'cpp/CMakeLists.txt') }}
          restore-keys: |
            windows-cmake-

      - name: Configure CMake
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL" -DVULKAN_SDK="%VULKAN_SDK%" -DVulkan_INCLUDE_DIR="%VULKAN_SDK%/Include" -DVulkan_LIBRARY="%VULKAN_SDK%/Lib/vulkan-1.lib"

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --config Release --parallel

      - name: Copy module to project root
        shell: powershell
        run: |
          Copy-Item build/Release/procengine_cpp*.pyd . -ErrorAction SilentlyContinue
          Copy-Item build/procengine_cpp*.pyd . -ErrorAction SilentlyContinue

      - name: Run integration tests
        shell: powershell
        run: |
          python -m pytest `
            test_cpp_engine.py `
            test_cpp_terrain.py `
            test_cpp_physics.py `
            test_cpp_props.py `
            test_cpp_materials.py `
            test_cpp_seed_registry.py `
            -v --tb=short
        continue-on-error: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-windows-x64
          path: |
            build/Release/procengine_cpp*.pyd
            build/procengine_cpp*.pyd
            cpp/
            *.py
            !test_*.py
            !conftest.py
            data/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # C++ Build (macOS)
  # ===========================================================================
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar
            /opt/homebrew/Cellar
          key: macos-homebrew-${{ runner.os }}-${{ hashFiles('.github/workflows/ci.yml') }}
          restore-keys: |
            macos-homebrew-${{ runner.os }}-

      - name: Install dependencies
        run: |
          brew install molten-vk openssl shaderc glslang || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Vulkan environment
        run: |
          VULKAN_SDK=$(brew --prefix molten-vk)
          echo "VULKAN_SDK=$VULKAN_SDK" >> $GITHUB_ENV
          echo "VK_ICD_FILENAMES=$VULKAN_SDK/share/vulkan/icd.d/MoltenVK_icd.json" >> $GITHUB_ENV

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: macos-cmake-${{ hashFiles('cpp/**/*.cpp', 'cpp/**/*.h', 'cpp/CMakeLists.txt') }}
          restore-keys: |
            macos-cmake-

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          VULKAN_SDK=$(brew --prefix molten-vk)
          OPENSSL_PREFIX=$(brew --prefix openssl)
          cmake ../cpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_PREFIX \
            -DVULKAN_SDK=$VULKAN_SDK \
            -DVulkan_INCLUDE_DIR=$VULKAN_SDK/include \
            -DVulkan_LIBRARY=$VULKAN_SDK/lib/libMoltenVK.dylib

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --parallel $(sysctl -n hw.ncpu)
        continue-on-error: true

      - name: Copy module to project root
        run: |
          cp build/procengine_cpp*.so . 2>/dev/null || true
          cp build/procengine_cpp*.dylib . 2>/dev/null || true
        continue-on-error: true

      - name: Run integration tests
        run: |
          python -m pytest \
            test_cpp_engine.py \
            test_cpp_terrain.py \
            test_cpp_physics.py \
            test_cpp_props.py \
            test_cpp_materials.py \
            test_cpp_seed_registry.py \
            -v --tb=short
        continue-on-error: true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-macos-x64
          path: |
            build/procengine_cpp*.so
            build/procengine_cpp*.dylib
            cpp/
            *.py
            !test_*.py
            !conftest.py
            data/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # Build Standalone Executables (All Platforms)
  # ===========================================================================
  build-standalone:
    name: Build Standalone (${{ matrix.os }})
    needs: [build-linux, build-windows, build-macos]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: ProceduralEngine-Linux-x64
            archive_ext: tar.gz
          - os: windows-latest
            platform: windows
            artifact_name: ProceduralEngine-Windows-x64
            archive_ext: zip
          - os: macos-latest
            platform: macos
            artifact_name: ProceduralEngine-macOS-x64
            archive_ext: tar.gz

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake libssl-dev libvulkan-dev \
            vulkan-validationlayers libshaderc-dev glslang-tools

      # Windows dependencies
      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Install OpenSSL (Windows)
        if: matrix.platform == 'windows'
        run: choco install openssl --no-progress

      # macOS dependencies
      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install molten-vk openssl shaderc glslang || true
          echo "VULKAN_SDK=$(brew --prefix molten-vk)" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build C++ module (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p build && cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release
          cmake --build . --parallel $(nproc)
          cp procengine_cpp*.so ../ 2>/dev/null || true

      - name: Build C++ module (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL" -DVULKAN_SDK="%VULKAN_SDK%" -DVulkan_INCLUDE_DIR="%VULKAN_SDK%/Include" -DVulkan_LIBRARY="%VULKAN_SDK%/Lib/vulkan-1.lib"
          cmake --build . --config Release --parallel
        continue-on-error: true

      - name: Copy Windows module
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          Copy-Item build/Release/procengine_cpp*.pyd . -ErrorAction SilentlyContinue
          Copy-Item build/procengine_cpp*.pyd . -ErrorAction SilentlyContinue
        continue-on-error: true

      - name: Build C++ module (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p build && cd build
          VULKAN_SDK=$(brew --prefix molten-vk)
          OPENSSL_PREFIX=$(brew --prefix openssl)
          cmake ../cpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_PREFIX \
            -DVULKAN_SDK=$VULKAN_SDK \
            -DVulkan_INCLUDE_DIR=$VULKAN_SDK/include \
            -DVulkan_LIBRARY=$VULKAN_SDK/lib/libMoltenVK.dylib
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          cp procengine_cpp*.so ../ 2>/dev/null || true
          cp procengine_cpp*.dylib ../ 2>/dev/null || true
        continue-on-error: true

      - name: Build standalone executable
        run: |
          pyinstaller \
            --name ProceduralEngine \
            --onedir \
            --console \
            --add-data "data:data" \
            --add-data "*.py:." \
            --hidden-import numpy \
            --hidden-import pybind11 \
            --collect-all procengine_cpp 2>/dev/null || true \
            main.py
        shell: bash
        continue-on-error: true

      - name: Bundle game data (Unix)
        if: matrix.platform != 'windows'
        run: |
          mkdir -p dist/ProceduralEngine/data
          cp -r data/* dist/ProceduralEngine/data/ 2>/dev/null || true
          # Copy C++ module if not included by pyinstaller
          cp procengine_cpp*.so dist/ProceduralEngine/ 2>/dev/null || true
          cp procengine_cpp*.dylib dist/ProceduralEngine/ 2>/dev/null || true
        continue-on-error: true

      - name: Bundle game data (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist/ProceduralEngine/data
          Copy-Item -Recurse data/* dist/ProceduralEngine/data/ -ErrorAction SilentlyContinue
          Copy-Item procengine_cpp*.pyd dist/ProceduralEngine/ -ErrorAction SilentlyContinue
        continue-on-error: true

      - name: Create archive (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czvf ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} ProceduralEngine/ 2>/dev/null || true
        continue-on-error: true

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          cd dist
          Compress-Archive -Path ProceduralEngine -DestinationPath ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} -ErrorAction SilentlyContinue
        continue-on-error: true

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
            dist/ProceduralEngine/
          if-no-files-found: warn
          retention-days: 7
