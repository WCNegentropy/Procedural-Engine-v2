name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ===========================================================================
  # Python Linting & Type Checking
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-setuptools numpy

      - name: Run Ruff linter
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Run Ruff formatter check
        run: ruff format --check .
        continue-on-error: true

      - name: Run mypy type checker
        run: mypy --ignore-missing-imports *.py
        continue-on-error: true

  # ===========================================================================
  # Python Unit Tests (No C++ required)
  # ===========================================================================
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python-only tests
        run: |
          python -m pytest \
            test_engine.py \
            test_engine_determinism.py \
            test_hot_reload.py \
            test_materials.py \
            test_physics.py \
            test_physics_3d.py \
            test_props.py \
            test_seed_registry.py \
            test_seed_sweeper.py \
            test_terrain.py \
            test_world.py \
            test_game_api.py \
            test_behavior_tree.py \
            test_player_controller.py \
            test_data_loader.py \
            test_game_runner.py \
            test_ui_system.py \
            test_graphics_bridge.py \
            -v --tb=short

  # ===========================================================================
  # C++ Build & Integration Tests (Linux)
  # ===========================================================================
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential cmake libssl-dev libvulkan-dev vulkan-validationlayers libshaderc-dev glslang-tools
          version: 1.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: linux-cmake-${{ hashFiles('cpp/**/*.cpp', 'cpp/**/*.h', 'cpp/CMakeLists.txt') }}
          restore-keys: |
            linux-cmake-

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --parallel $(nproc)

      - name: Copy module to project root
        run: |
          cp build/procengine_cpp*.so .

      - name: Run full test suite
        run: |
          python -m pytest \
            test_*.py \
            --ignore=test_cpp_graphics.py \
            -v --tb=short

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-linux-x64
          path: |
            build/procengine_cpp*.so
            cpp/
            *.py
            !test_*.py
            !conftest.py
            data/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7

  # ===========================================================================
  # C++ Build & Integration Tests (Windows)
  # ===========================================================================
  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache Chocolatey packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Temp\chocolatey
          key: windows-choco-openssl-${{ runner.os }}
          restore-keys: |
            windows-choco-

      - name: Install OpenSSL
        run: |
          choco install openssl --no-progress

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-cmake-${{ hashFiles('cpp/**/*.cpp', 'cpp/**/*.h', 'cpp/CMakeLists.txt') }}
          restore-keys: |
            windows-cmake-

      - name: Configure CMake
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL" -DVULKAN_SDK="%VULKAN_SDK%" -DVulkan_INCLUDE_DIR="%VULKAN_SDK%/Include" -DVulkan_LIBRARY="%VULKAN_SDK%/Lib/vulkan-1.lib"

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --config Release --parallel

      - name: Copy module to project root
        shell: powershell
        run: |
          Copy-Item build/Release/procengine_cpp*.pyd . -ErrorAction SilentlyContinue
          Copy-Item build/procengine_cpp*.pyd . -ErrorAction SilentlyContinue

      - name: Run integration tests
        shell: powershell
        run: |
          python -m pytest `
            test_cpp_engine.py `
            test_cpp_terrain.py `
            test_cpp_physics.py `
            test_cpp_props.py `
            test_cpp_materials.py `
            test_cpp_seed_registry.py `
            -v --tb=short
        continue-on-error: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-windows-x64
          path: |
            build/Release/procengine_cpp*.pyd
            build/procengine_cpp*.pyd
            cpp/
            *.py
            !test_*.py
            !conftest.py
            data/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # C++ Build & Integration Tests (macOS) - FIXED MoltenVK
  # ===========================================================================
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache Homebrew packages
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /usr/local/Cellar
            /opt/homebrew/Cellar
          key: macos-homebrew-${{ runner.os }}-v2
          restore-keys: |
            macos-homebrew-${{ runner.os }}-

      - name: Install dependencies
        run: |
          brew install openssl shaderc glslang || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # =========================================================================
      # FIXED: Proper MoltenVK / Vulkan SDK installation for macOS
      # =========================================================================
      - name: Install Vulkan SDK (macOS)
        run: |
          # Download and install the official LunarG Vulkan SDK which includes MoltenVK
          curl -sSL -o vulkansdk.dmg "https://sdk.lunarg.com/sdk/download/1.3.290.0/mac/vulkansdk-macos-1.3.290.0.dmg"
          hdiutil attach vulkansdk.dmg -mountpoint /Volumes/VulkanSDK
          
          # Run the installer or copy files
          sudo /Volumes/VulkanSDK/InstallVulkan.app/Contents/MacOS/InstallVulkan \
            --root ~/VulkanSDK/1.3.290.0 \
            --accept-licenses \
            --default-answer \
            --confirm-command install
          
          hdiutil detach /Volumes/VulkanSDK
          
          # Set environment variables
          echo "VULKAN_SDK=$HOME/VulkanSDK/1.3.290.0/macOS" >> $GITHUB_ENV
          echo "VK_ICD_FILENAMES=$HOME/VulkanSDK/1.3.290.0/macOS/share/vulkan/icd.d/MoltenVK_icd.json" >> $GITHUB_ENV
          echo "VK_LAYER_PATH=$HOME/VulkanSDK/1.3.290.0/macOS/share/vulkan/explicit_layer.d" >> $GITHUB_ENV
          echo "DYLD_LIBRARY_PATH=$HOME/VulkanSDK/1.3.290.0/macOS/lib:$DYLD_LIBRARY_PATH" >> $GITHUB_ENV

      - name: Verify Vulkan installation
        run: |
          echo "VULKAN_SDK: $VULKAN_SDK"
          ls -la $VULKAN_SDK/lib/ || echo "SDK lib not found"
          ls -la $VULKAN_SDK/include/vulkan/ || echo "SDK include not found"

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: macos-cmake-${{ hashFiles('cpp/**/*.cpp', 'cpp/**/*.h', 'cpp/CMakeLists.txt') }}-v2
          restore-keys: |
            macos-cmake-

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          OPENSSL_PREFIX=$(brew --prefix openssl)
          cmake ../cpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_PREFIX \
            -DVULKAN_SDK=$VULKAN_SDK \
            -DVulkan_INCLUDE_DIR=$VULKAN_SDK/include \
            -DVulkan_LIBRARY=$VULKAN_SDK/lib/libvulkan.dylib \
            -DCMAKE_MACOSX_RPATH=ON

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --parallel $(sysctl -n hw.ncpu)

      - name: Copy module to project root
        run: |
          cp build/procengine_cpp*.so . 2>/dev/null || true
          cp build/procengine_cpp*.dylib . 2>/dev/null || true

      - name: Run integration tests
        run: |
          python -m pytest \
            test_cpp_engine.py \
            test_cpp_terrain.py \
            test_cpp_physics.py \
            test_cpp_props.py \
            test_cpp_materials.py \
            test_cpp_seed_registry.py \
            -v --tb=short
        continue-on-error: true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-macos-x64
          path: |
            build/procengine_cpp*.so
            build/procengine_cpp*.dylib
            cpp/
            *.py
            !test_*.py
            !conftest.py
            data/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # Build Standalone Executables (All Platforms) - FIXED
  # ===========================================================================
  build-standalone:
    name: Build Standalone (${{ matrix.os }})
    needs: [build-linux, build-windows, build-macos]
    if: always() && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: ProceduralEngine-Linux-x64
            archive_ext: tar.gz
            module_ext: ".so"
          - os: windows-latest
            platform: windows
            artifact_name: ProceduralEngine-Windows-x64
            archive_ext: zip
            module_ext: ".pyd"
          - os: macos-latest
            platform: macos
            artifact_name: ProceduralEngine-macOS-x64
            archive_ext: tar.gz
            module_ext: ".so"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Download pre-built C++ module from earlier job
      - name: Download built module (Linux)
        if: matrix.platform == 'linux'
        uses: actions/download-artifact@v4
        with:
          name: procengine-linux-x64
          path: ./artifact
        continue-on-error: true

      - name: Download built module (Windows)
        if: matrix.platform == 'windows'
        uses: actions/download-artifact@v4
        with:
          name: procengine-windows-x64
          path: ./artifact
        continue-on-error: true

      - name: Download built module (macOS)
        if: matrix.platform == 'macos'
        uses: actions/download-artifact@v4
        with:
          name: procengine-macos-x64
          path: ./artifact
        continue-on-error: true

      - name: Copy module from artifact
        shell: bash
        run: |
          # Find and copy the C++ module
          find ./artifact -name "procengine_cpp*" -type f | head -5
          cp ./artifact/build/procengine_cpp*${{ matrix.module_ext }} . 2>/dev/null || \
          cp ./artifact/build/Release/procengine_cpp*${{ matrix.module_ext }} . 2>/dev/null || \
          cp ./artifact/procengine_cpp*${{ matrix.module_ext }} . 2>/dev/null || \
          echo "Warning: Could not find pre-built module"
          
          # List what we have
          ls -la procengine_cpp* 2>/dev/null || echo "No module found"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify module loads
        run: |
          python -c "
          try:
              import procengine_cpp
              print(f'Module loaded: {procengine_cpp}')
          except ImportError as e:
              print(f'Module not loadable: {e}')
          "
        continue-on-error: true

      # =========================================================================
      # FIXED: PyInstaller build with proper module inclusion
      # =========================================================================
      - name: Build standalone executable (Unix)
        if: matrix.platform != 'windows'
        run: |
          # Find the actual module file
          MODULE_FILE=$(ls procengine_cpp*${{ matrix.module_ext }} 2>/dev/null | head -1)
          
          if [ -n "$MODULE_FILE" ]; then
            echo "Found module: $MODULE_FILE"
            pyinstaller \
              --name ProceduralEngine \
              --onedir \
              --console \
              --add-data "data:data" \
              --add-binary "$MODULE_FILE:." \
              --hidden-import numpy \
              --hidden-import numpy.core \
              --hidden-import pybind11 \
              --collect-submodules numpy \
              main.py
          else
            echo "ERROR: No C++ module found - cannot build standalone"
            exit 1
          fi

      - name: Build standalone executable (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          # Find the module file
          $moduleFile = Get-ChildItem -Name "procengine_cpp*.pyd" -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if ($moduleFile) {
            Write-Host "Found module: $moduleFile"
            pyinstaller `
              --name ProceduralEngine `
              --onedir `
              --console `
              --add-data "data;data" `
              --add-binary "$moduleFile;." `
              --hidden-import numpy `
              --hidden-import numpy.core `
              --hidden-import pybind11 `
              --collect-submodules numpy `
              main.py
          } else {
            Write-Host "ERROR: No C++ module found - cannot build standalone"
            exit 1
          }

      - name: Bundle game data (Unix)
        if: matrix.platform != 'windows'
        run: |
          # Ensure data directory exists in output
          mkdir -p dist/ProceduralEngine/data
          cp -r data/* dist/ProceduralEngine/data/ 2>/dev/null || true
          
          # Verify the executable exists
          ls -la dist/ProceduralEngine/
          
          # Make executable
          chmod +x dist/ProceduralEngine/ProceduralEngine 2>/dev/null || true

      - name: Bundle game data (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          # Ensure data directory exists
          New-Item -ItemType Directory -Force -Path dist/ProceduralEngine/data
          Copy-Item -Recurse data/* dist/ProceduralEngine/data/ -ErrorAction SilentlyContinue
          
          # Verify the executable exists
          Get-ChildItem dist/ProceduralEngine/

      - name: Test standalone executable (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd dist/ProceduralEngine
          ./ProceduralEngine --help || echo "Executable test completed"
        continue-on-error: true

      - name: Test standalone executable (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          cd dist/ProceduralEngine
          ./ProceduralEngine.exe --help
        continue-on-error: true

      - name: Create archive (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czvf ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} ProceduralEngine/

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          cd dist
          Compress-Archive -Path ProceduralEngine -DestinationPath "${{ matrix.artifact_name }}.${{ matrix.archive_ext }}"

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 7
