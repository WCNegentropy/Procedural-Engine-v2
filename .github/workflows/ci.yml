name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ===========================================================================
  # Python Linting & Type Checking
  # ===========================================================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy types-setuptools numpy

      - name: Run Ruff linter
        run: ruff check . --output-format=github
        continue-on-error: true

      - name: Run Ruff formatter check
        run: ruff format --check .
        continue-on-error: true

      - name: Run mypy type checker
        run: mypy --ignore-missing-imports *.py procengine/
        continue-on-error: true

  # ===========================================================================
  # Python Unit Tests (No C++ required)
  # ===========================================================================
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Python-only tests
        run: |
          python -m pytest \
            tests/unit/ \
            tests/integration/test_world.py \
            -v --tb=short

  # ===========================================================================
  # C++ Build & Integration Tests (Linux)
  # ===========================================================================
  build-linux:
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential cmake libssl-dev libvulkan-dev vulkan-validationlayers libshaderc-dev glslang-tools
          version: 1.0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: linux-cmake-${{ hashFiles('cpp/**/*.cpp', 'cpp/**/*.h', 'cpp/CMakeLists.txt') }}
          restore-keys: |
            linux-cmake-

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --parallel $(nproc)

      - name: Copy module to project root
        run: |
          cp build/procengine_cpp*.so .

      - name: Run full test suite
        run: |
          python -m pytest \
            tests/ \
            --ignore=tests/integration/test_cpp_graphics.py \
            -v --tb=short

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-linux-x64
          path: |
            procengine_cpp*.so
            build/procengine_cpp*.so
            cpp/
            procengine/
            *.py
            !test_*.py
            !conftest.py
            data/
            tests/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7

  # ===========================================================================
  # C++ Build & Integration Tests (Windows)
  # ===========================================================================
  build-windows:
    name: Build & Test (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download SDL2 DLLs
        shell: powershell
        run: |
          # Download SDL2 runtime DLLs for Windows
          $SDL2_VERSION = "2.30.0"
          $SDL2_URL = "https://github.com/libsdl-org/SDL/releases/download/release-$SDL2_VERSION/SDL2-$SDL2_VERSION-win32-x64.zip"
          Invoke-WebRequest -Uri $SDL2_URL -OutFile SDL2.zip
          Expand-Archive SDL2.zip -DestinationPath SDL2_temp
          # Copy SDL2.dll to project root (will be included in artifact)
          Copy-Item SDL2_temp/SDL2.dll . -Force
          echo "SDL2.dll downloaded and placed in project root"
          Remove-Item SDL2.zip
          Remove-Item SDL2_temp -Recurse

      - name: Cache Chocolatey packages
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\Temp\chocolatey
          key: windows-choco-openssl-${{ runner.os }}
          restore-keys: |
            windows-choco-

      - name: Install OpenSSL
        run: |
          choco install openssl --no-progress

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: build
          key: windows-cmake-${{ hashFiles('cpp/**/*.cpp', 'cpp/**/*.h', 'cpp/CMakeLists.txt') }}
          restore-keys: |
            windows-cmake-

      - name: Configure CMake
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL" -DVULKAN_SDK="%VULKAN_SDK%" -DVulkan_INCLUDE_DIR="%VULKAN_SDK%/Include" -DVulkan_LIBRARY="%VULKAN_SDK%/Lib/vulkan-1.lib"

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --config Release --parallel

      - name: Copy module to project root
        shell: powershell
        run: |
          Copy-Item build/Release/procengine_cpp*.pyd . -ErrorAction SilentlyContinue
          Copy-Item build/procengine_cpp*.pyd . -ErrorAction SilentlyContinue

      - name: Copy required DLLs for testing
        shell: powershell
        run: |
          # Copy OpenSSL DLLs to project root (so Python can find them)
          $opensslBin = "C:\Program Files\OpenSSL\bin"
          if (Test-Path "$opensslBin\libcrypto-3-x64.dll") {
            Copy-Item "$opensslBin\libcrypto-3-x64.dll" . -Force
            echo "Copied libcrypto-3-x64.dll"
          }
          if (Test-Path "$opensslBin\libssl-3-x64.dll") {
            Copy-Item "$opensslBin\libssl-3-x64.dll" . -Force
            echo "Copied libssl-3-x64.dll"
          }
          
          # Copy Vulkan and shaderc DLLs from Vulkan SDK
          $vulkanBin = "$env:VULKAN_SDK\Bin"
          if (Test-Path "$vulkanBin\vulkan-1.dll") {
            Copy-Item "$vulkanBin\vulkan-1.dll" . -Force
            echo "Copied vulkan-1.dll"
          }
          if (Test-Path "$vulkanBin\shaderc_shared.dll") {
            Copy-Item "$vulkanBin\shaderc_shared.dll" . -Force
            echo "Copied shaderc_shared.dll"
          }
          
          echo "=== DLLs in project directory ==="
          Get-ChildItem *.dll

      - name: Run integration tests
        shell: powershell
        run: |
          python -m pytest `
            tests/integration/test_cpp_engine.py `
            tests/integration/test_cpp_terrain.py `
            tests/integration/test_cpp_physics.py `
            tests/integration/test_cpp_props.py `
            tests/integration/test_cpp_materials.py `
            tests/integration/test_cpp_seed_registry.py `
            -v --tb=short
        continue-on-error: true

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-windows-x64
          path: |
            procengine_cpp*.pyd
            build/Release/procengine_cpp*.pyd
            build/procengine_cpp*.pyd
            SDL2.dll
            libcrypto-3-x64.dll
            libssl-3-x64.dll
            vulkan-1.dll
            shaderc_shared.dll
            cpp/
            procengine/
            *.py
            !test_*.py
            !conftest.py
            data/
            tests/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # C++ Build & Integration Tests (macOS) - FIXED MoltenVK
  # ===========================================================================
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          brew install molten-vk openssl shaderc glslang vulkan-headers || true
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Debug shaderc installation
        run: |
          echo "=== Shaderc prefix ==="
          SHADERC_PREFIX=$(brew --prefix shaderc)
          echo "SHADERC_PREFIX: $SHADERC_PREFIX"
          
          echo ""
          echo "=== Contents of shaderc lib directory ==="
          ls -la $SHADERC_PREFIX/lib/ || echo "lib dir not found"
          
          echo ""
          echo "=== All shaderc library files ==="
          find $SHADERC_PREFIX -name "*shaderc*" -type f 2>/dev/null || echo "no files found"
          
          echo ""
          echo "=== Shaderc include directory ==="
          ls -la $SHADERC_PREFIX/include/shaderc/ || echo "include dir not found"

      - name: Set up build environment
        run: |
          # Export paths for CMake
          echo "VULKAN_SDK=$(brew --prefix molten-vk)" >> $GITHUB_ENV
          echo "VULKAN_HEADERS=$(brew --prefix vulkan-headers)" >> $GITHUB_ENV
          echo "OPENSSL_PREFIX=$(brew --prefix openssl)" >> $GITHUB_ENV
          echo "SHADERC_PREFIX=$(brew --prefix shaderc)" >> $GITHUB_ENV

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          
          VULKAN_SDK=$(brew --prefix molten-vk)
          VULKAN_HEADERS=$(brew --prefix vulkan-headers)
          OPENSSL_PREFIX=$(brew --prefix openssl)
          SHADERC_PREFIX=$(brew --prefix shaderc)
          
          # Find the shaderc library - it could be named differently
          # Try in order: libshaderc_combined.a, libshaderc.a, libshaderc.dylib
          if [ -f "$SHADERC_PREFIX/lib/libshaderc_combined.a" ]; then
            SHADERC_LIB="$SHADERC_PREFIX/lib/libshaderc_combined.a"
          elif [ -f "$SHADERC_PREFIX/lib/libshaderc.a" ]; then
            SHADERC_LIB="$SHADERC_PREFIX/lib/libshaderc.a"
          elif [ -f "$SHADERC_PREFIX/lib/libshaderc.dylib" ]; then
            SHADERC_LIB="$SHADERC_PREFIX/lib/libshaderc.dylib"
          else
            echo "ERROR: Could not find shaderc library!"
            echo "Contents of $SHADERC_PREFIX/lib/:"
            ls -la "$SHADERC_PREFIX/lib/"
            exit 1
          fi
          
          echo "=== Using shaderc library: $SHADERC_LIB ==="
          
          cmake ../cpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_PREFIX \
            -DVULKAN_SDK=$VULKAN_SDK \
            -DVulkan_INCLUDE_DIR=$VULKAN_HEADERS/include \
            -DVulkan_LIBRARY=$VULKAN_SDK/lib/libMoltenVK.dylib \
            -DSHADERC_LIB="$SHADERC_LIB" \
            -DSHADERC_INCLUDE_DIR=$SHADERC_PREFIX/include

      - name: Build C++ module
        run: |
          cd build
          cmake --build . --parallel $(sysctl -n hw.ncpu)

      - name: Copy module to project root
        run: |
          cp build/procengine_cpp*.so . 2>/dev/null || true
          cp build/procengine_cpp*.dylib . 2>/dev/null || true
          ls -la procengine_cpp* || echo "Warning: No module found"

      - name: Run integration tests
        run: |
          python -m pytest \
            tests/integration/test_cpp_engine.py \
            tests/integration/test_cpp_terrain.py \
            tests/integration/test_cpp_physics.py \
            tests/integration/test_cpp_props.py \
            tests/integration/test_cpp_materials.py \
            tests/integration/test_cpp_seed_registry.py \
            -v --tb=short
        continue-on-error: true

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: procengine-macos-x64
          path: |
            procengine_cpp*.so
            procengine_cpp*.dylib
            build/procengine_cpp*.so
            build/procengine_cpp*.dylib
            cpp/
            procengine/
            *.py
            !test_*.py
            !conftest.py
            data/
            tests/
            pyproject.toml
            setup.py
            MANIFEST.in
            requirements.txt
            README.md
            AGENTS.md
            CLAUDE.md
            plan.md
          retention-days: 7
          if-no-files-found: warn

  # ===========================================================================
  # Build Standalone Executables (All Platforms) - FIXED
  # ===========================================================================
  build-standalone:
    name: Build Standalone (${{ matrix.os }})
    needs: [build-linux, build-windows, build-macos]
    if: always() && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success' || needs.build-macos.result == 'success')
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_name: ProceduralEngine-Linux-x64
            archive_ext: tar.gz
            module_ext: ".so"
          - os: windows-latest
            platform: windows
            artifact_name: ProceduralEngine-Windows-x64
            archive_ext: zip
            module_ext: ".pyd"
          - os: macos-latest
            platform: macos
            artifact_name: ProceduralEngine-macOS-x64
            archive_ext: tar.gz
            module_ext: ".so"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Download pre-built C++ module from earlier job
      - name: Download built module (Linux)
        if: matrix.platform == 'linux'
        uses: actions/download-artifact@v4
        with:
          name: procengine-linux-x64
          path: ./artifact
        continue-on-error: true

      - name: Download built module (Windows)
        if: matrix.platform == 'windows'
        uses: actions/download-artifact@v4
        with:
          name: procengine-windows-x64
          path: ./artifact
        continue-on-error: true

      - name: Download built module (macOS)
        if: matrix.platform == 'macos'
        uses: actions/download-artifact@v4
        with:
          name: procengine-macos-x64
          path: ./artifact
        continue-on-error: true

      - name: Copy module from artifact
        shell: bash
        run: |
          echo "=== Searching for C++ module in artifact ==="
          find ./artifact -name "procengine_cpp*" -type f
          
          echo ""
          echo "=== Attempting to copy module ==="
          # Try multiple possible locations using find to handle wildcards
          MODULE_FOUND=false
          
          # Try artifact root first (most likely after our upload changes)
          if [ -n "$(find ./artifact -maxdepth 1 -name 'procengine_cpp*${{ matrix.module_ext }}' -type f)" ]; then
            cp ./artifact/procengine_cpp*${{ matrix.module_ext }} .
            echo "Copied from ./artifact/"
            MODULE_FOUND=true
          elif [ -n "$(find ./artifact/build -maxdepth 1 -name 'procengine_cpp*${{ matrix.module_ext }}' -type f 2>/dev/null)" ]; then
            cp ./artifact/build/procengine_cpp*${{ matrix.module_ext }} .
            echo "Copied from ./artifact/build/"
            MODULE_FOUND=true
          elif [ -n "$(find ./artifact/build/Release -maxdepth 1 -name 'procengine_cpp*${{ matrix.module_ext }}' -type f 2>/dev/null)" ]; then
            cp ./artifact/build/Release/procengine_cpp*${{ matrix.module_ext }} .
            echo "Copied from ./artifact/build/Release/"
            MODULE_FOUND=true
          fi
          
          if [ "$MODULE_FOUND" = false ]; then
            echo "ERROR: Could not find pre-built module!"
            echo "Artifact contents:"
            ls -R ./artifact/ | head -50
            exit 1
          fi
          
          echo ""
          echo "=== Module in current directory ==="
          ls -la procengine_cpp*${{ matrix.module_ext }} || exit 1

      - name: Copy DLLs from artifact (Windows)
        if: matrix.platform == 'windows'
        shell: bash
        run: |
          echo "=== Searching for DLLs in artifact ==="
          find ./artifact -name "*.dll" -type f
          
          echo ""
          echo "=== Copying DLLs ==="
          # Copy DLLs from artifact if they exist
          cp ./artifact/*.dll . 2>/dev/null || echo "No DLLs in artifact root"
          
          echo ""
          echo "=== DLLs in current directory ==="
          ls -la *.dll 2>/dev/null || echo "Warning: No DLLs found"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify module loads
        run: |
          python -c "
          try:
              import procengine_cpp
              print(f'Module loaded: {procengine_cpp}')
          except ImportError as e:
              print(f'Module not loadable: {e}')
          "
        continue-on-error: true

      # =========================================================================
      # FIXED: PyInstaller build with proper module inclusion
      # =========================================================================
      - name: Build standalone executable (Unix)
        if: matrix.platform != 'windows'
        run: |
          # Find the actual module file
          MODULE_FILE=$(ls procengine_cpp*${{ matrix.module_ext }} 2>/dev/null | head -1)

          if [ -n "$MODULE_FILE" ]; then
            echo "Found module: $MODULE_FILE"
            pyinstaller \
              --name ProceduralEngine \
              --onedir \
              --console \
              --add-data "data:data" \
              --add-data "procengine:procengine" \
              --add-binary "$MODULE_FILE:." \
              --hidden-import numpy \
              --hidden-import numpy.core \
              --hidden-import pybind11 \
              --hidden-import procengine \
              --collect-submodules numpy \
              --collect-submodules procengine \
              main.py
          else
            echo "ERROR: No C++ module found - cannot build standalone"
            exit 1
          fi

      - name: Build standalone executable (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          # Find the module file
          $moduleFile = Get-ChildItem -Name "procengine_cpp*.pyd" -ErrorAction SilentlyContinue | Select-Object -First 1

          if ($moduleFile) {
            Write-Host "Found module: $moduleFile"

            # Build base PyInstaller args
            $args = @(
              "--name", "ProceduralEngine",
              "--onedir",
              "--console",
              "--add-data", "data;data",
              "--add-data", "procengine;procengine",
              "--add-binary", "$moduleFile;.",
              "--hidden-import", "numpy",
              "--hidden-import", "numpy.core",
              "--hidden-import", "pybind11",
              "--hidden-import", "procengine",
              "--collect-submodules", "numpy",
              "--collect-submodules", "procengine"
            )

            # Add DLLs if they exist
            if (Test-Path "SDL2.dll") {
              $args += "--add-binary", "SDL2.dll;."
            }
            if (Test-Path "libcrypto-3-x64.dll") {
              $args += "--add-binary", "libcrypto-3-x64.dll;."
            }
            if (Test-Path "libssl-3-x64.dll") {
              $args += "--add-binary", "libssl-3-x64.dll;."
            }
            if (Test-Path "vulkan-1.dll") {
              $args += "--add-binary", "vulkan-1.dll;."
            }
            if (Test-Path "shaderc_shared.dll") {
              $args += "--add-binary", "shaderc_shared.dll;."
            }

            $args += "main.py"

            Write-Host "PyInstaller args: $args"
            pyinstaller @args
          } else {
            Write-Host "ERROR: No C++ module found - cannot build standalone"
            exit 1
          }

      - name: Bundle game data (Unix)
        if: matrix.platform != 'windows'
        run: |
          # Ensure data directory exists in output
          mkdir -p dist/ProceduralEngine/data
          cp -r data/* dist/ProceduralEngine/data/ 2>/dev/null || true
          
          # Verify the executable exists
          ls -la dist/ProceduralEngine/
          
          # Make executable
          chmod +x dist/ProceduralEngine/ProceduralEngine 2>/dev/null || true

      - name: Bundle game data (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          # Ensure data directory exists
          New-Item -ItemType Directory -Force -Path dist/ProceduralEngine/data
          Copy-Item -Recurse data/* dist/ProceduralEngine/data/ -ErrorAction SilentlyContinue
          
          # Verify the executable exists
          Get-ChildItem dist/ProceduralEngine/

      - name: Test standalone executable (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd dist/ProceduralEngine
          ./ProceduralEngine --help || echo "Executable test completed"
        continue-on-error: true

      - name: Test standalone executable (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          cd dist/ProceduralEngine
          ./ProceduralEngine.exe --help
        continue-on-error: true

      - name: Create archive (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czvf ${{ matrix.artifact_name }}.${{ matrix.archive_ext }} ProceduralEngine/

      - name: Create archive (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          cd dist
          Compress-Archive -Path ProceduralEngine -DestinationPath "${{ matrix.artifact_name }}.${{ matrix.archive_ext }}"

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.${{ matrix.archive_ext }}
          if-no-files-found: error
          retention-days: 7
