name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.0.0)'
        required: true
        type: string

env:
  PYTHON_VERSION: "3.12"
  GAME_NAME: "ProceduralEngine"

jobs:
  # ===========================================================================
  # Build Wheels for All Platforms
  # ===========================================================================
  build-wheels:
    name: Build Wheel (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            artifact_suffix: linux-x64
          - os: windows-latest
            platform: windows
            artifact_suffix: windows-x64
          - os: macos-latest
            platform: macos
            artifact_suffix: macos-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake libssl-dev libvulkan-dev \
            vulkan-validationlayers libshaderc-dev glslang-tools \
            patchelf

      # Windows dependencies
      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Install OpenSSL (Windows)
        if: matrix.platform == 'windows'
        run: choco install openssl --no-progress

      # macOS dependencies
      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install molten-vk openssl shaderc glslang
          echo "VULKAN_SDK=$(brew --prefix molten-vk)" >> $GITHUB_ENV

      - name: Install Python build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools pybind11 numpy

      - name: Build wheel
        run: python -m build --wheel
        continue-on-error: true  # May fail on some platforms

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.artifact_suffix }}
          path: dist/*.whl
          if-no-files-found: warn

  # ===========================================================================
  # Build Standalone Executables with Game Data
  # ===========================================================================
  build-standalone:
    name: Build Standalone (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            ext: ""
            artifact_name: ProceduralEngine-Linux-x64
            steam_depot: linux
          - os: windows-latest
            platform: windows
            ext: ".exe"
            artifact_name: ProceduralEngine-Windows-x64
            steam_depot: windows
          - os: macos-latest
            platform: macos
            ext: ""
            artifact_name: ProceduralEngine-macOS-x64
            steam_depot: macos

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Linux dependencies
      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake libssl-dev libvulkan-dev \
            vulkan-validationlayers libshaderc-dev glslang-tools

      # Windows dependencies
      - name: Install Vulkan SDK (Windows)
        if: matrix.platform == 'windows'
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.3.290.0
          cache: true

      - name: Install OpenSSL (Windows)
        if: matrix.platform == 'windows'
        run: choco install openssl --no-progress

      # macOS dependencies
      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install molten-vk openssl shaderc glslang
          echo "VULKAN_SDK=$(brew --prefix molten-vk)" >> $GITHUB_ENV

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build C++ module (Linux)
        if: matrix.platform == 'linux'
        run: |
          mkdir -p build && cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release
          cmake --build . --parallel $(nproc)
          cp procengine_cpp*.so ../ 2>/dev/null || true

      - name: Build C++ module (Windows)
        if: matrix.platform == 'windows'
        shell: cmd
        run: |
          mkdir build
          cd build
          cmake ../cpp -DCMAKE_BUILD_TYPE=Release -DOPENSSL_ROOT_DIR="C:/Program Files/OpenSSL" -DVULKAN_SDK="%VULKAN_SDK%" -DVulkan_INCLUDE_DIR="%VULKAN_SDK%/Include" -DVulkan_LIBRARY="%VULKAN_SDK%/Lib/vulkan-1.lib"
          cmake --build . --config Release --parallel
        continue-on-error: true

      - name: Copy Windows module
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          Copy-Item build/Release/procengine_cpp*.pyd . -ErrorAction SilentlyContinue
          Copy-Item build/procengine_cpp*.pyd . -ErrorAction SilentlyContinue
        continue-on-error: true

      - name: Build C++ module (macOS)
        if: matrix.platform == 'macos'
        run: |
          mkdir -p build && cd build
          VULKAN_SDK=$(brew --prefix molten-vk)
          OPENSSL_PREFIX=$(brew --prefix openssl)
          cmake ../cpp \
            -DCMAKE_BUILD_TYPE=Release \
            -DOPENSSL_ROOT_DIR=$OPENSSL_PREFIX \
            -DVULKAN_SDK=$VULKAN_SDK \
            -DVulkan_INCLUDE_DIR=$VULKAN_SDK/include \
            -DVulkan_LIBRARY=$VULKAN_SDK/lib/libMoltenVK.dylib
          cmake --build . --parallel $(sysctl -n hw.ncpu)
          cp procengine_cpp*.so ../ 2>/dev/null || true
          cp procengine_cpp*.dylib ../ 2>/dev/null || true
        continue-on-error: true

      - name: Build standalone executable
        run: |
          pyinstaller \
            --name ${{ env.GAME_NAME }} \
            --onedir \
            --console \
            --add-data "data:data" \
            --hidden-import numpy \
            --hidden-import pybind11 \
            --collect-all procengine_cpp 2>/dev/null || true \
            main.py
        shell: bash
        continue-on-error: true

      - name: Bundle game data and assets (Unix)
        if: matrix.platform != 'windows'
        run: |
          # Ensure dist directory structure
          mkdir -p dist/${{ env.GAME_NAME }}/data
          mkdir -p dist/${{ env.GAME_NAME }}/assets

          # Copy game data
          cp -r data/* dist/${{ env.GAME_NAME }}/data/ 2>/dev/null || true

          # Copy C++ module if not bundled
          cp procengine_cpp*.so dist/${{ env.GAME_NAME }}/ 2>/dev/null || true
          cp procengine_cpp*.dylib dist/${{ env.GAME_NAME }}/ 2>/dev/null || true

          # Copy Python sources for moddability
          mkdir -p dist/${{ env.GAME_NAME }}/scripts
          cp engine.py dist/${{ env.GAME_NAME }}/scripts/ 2>/dev/null || true
          cp game_api.py dist/${{ env.GAME_NAME }}/scripts/ 2>/dev/null || true
          cp behavior_tree.py dist/${{ env.GAME_NAME }}/scripts/ 2>/dev/null || true
          cp data_loader.py dist/${{ env.GAME_NAME }}/scripts/ 2>/dev/null || true

          # Create version file
          echo "${{ github.ref_name || inputs.version }}" > dist/${{ env.GAME_NAME }}/VERSION

          # Create README
          cat > dist/${{ env.GAME_NAME }}/README.txt << 'EOF'
          Procedural Engine v${{ github.ref_name || inputs.version }}
          ================================================

          A deterministic procedural world generation engine.

          Quick Start:
          1. Run ProceduralEngine (or ProceduralEngine.exe on Windows)
          2. The game will generate a world from seed 42 by default
          3. Use --seed <number> to specify a different seed

          Controls:
          - WASD: Move
          - Mouse: Look around
          - Space: Jump
          - E: Interact
          - I: Inventory
          - Escape: Pause menu

          Modding:
          - Game data is in the data/ folder (JSON format)
          - Python scripts are in the scripts/ folder

          Requirements:
          - Vulkan-compatible graphics card
          - 4GB RAM minimum

          For support, visit: https://github.com/WCNegentropy/Procedural-Engine-v2
          EOF
        continue-on-error: true

      - name: Bundle game data and assets (Windows)
        if: matrix.platform == 'windows'
        shell: powershell
        run: |
          # Ensure dist directory structure
          New-Item -ItemType Directory -Force -Path dist/${{ env.GAME_NAME }}/data
          New-Item -ItemType Directory -Force -Path dist/${{ env.GAME_NAME }}/assets
          New-Item -ItemType Directory -Force -Path dist/${{ env.GAME_NAME }}/scripts

          # Copy game data
          Copy-Item -Recurse data/* dist/${{ env.GAME_NAME }}/data/ -ErrorAction SilentlyContinue

          # Copy C++ module
          Copy-Item procengine_cpp*.pyd dist/${{ env.GAME_NAME }}/ -ErrorAction SilentlyContinue

          # Copy Python sources for moddability
          Copy-Item engine.py dist/${{ env.GAME_NAME }}/scripts/ -ErrorAction SilentlyContinue
          Copy-Item game_api.py dist/${{ env.GAME_NAME }}/scripts/ -ErrorAction SilentlyContinue
          Copy-Item behavior_tree.py dist/${{ env.GAME_NAME }}/scripts/ -ErrorAction SilentlyContinue
          Copy-Item data_loader.py dist/${{ env.GAME_NAME }}/scripts/ -ErrorAction SilentlyContinue

          # Create version file
          "${{ github.ref_name }}" | Out-File -FilePath dist/${{ env.GAME_NAME }}/VERSION

          # Create README
          @"
          Procedural Engine ${{ github.ref_name }}
          ================================================

          A deterministic procedural world generation engine.

          Quick Start:
          1. Run ProceduralEngine.exe
          2. The game will generate a world from seed 42 by default
          3. Use --seed <number> to specify a different seed

          Controls:
          - WASD: Move
          - Mouse: Look around
          - Space: Jump
          - E: Interact
          - I: Inventory
          - Escape: Pause menu

          Modding:
          - Game data is in the data/ folder (JSON format)
          - Python scripts are in the scripts/ folder

          Requirements:
          - Vulkan-compatible graphics card
          - 4GB RAM minimum
          - Windows 10/11 (64-bit)

          For support, visit: https://github.com/WCNegentropy/Procedural-Engine-v2
          "@ | Out-File -FilePath dist/${{ env.GAME_NAME }}/README.txt
        continue-on-error: true

      - name: Create release archive (Unix)
        if: matrix.platform != 'windows'
        run: |
          cd dist
          tar -czvf ${{ matrix.artifact_name }}.tar.gz ${{ env.GAME_NAME }}/ 2>/dev/null || true
        continue-on-error: true

      - name: Create release archive (Windows)
        if: matrix.platform == 'windows'
        run: |
          cd dist
          Compress-Archive -Path ${{ env.GAME_NAME }} -DestinationPath ${{ matrix.artifact_name }}.zip -ErrorAction SilentlyContinue
        shell: powershell
        continue-on-error: true

      - name: Prepare Steam depot structure
        run: |
          mkdir -p steam_depot/${{ matrix.steam_depot }}
          cp -r dist/${{ env.GAME_NAME }}/* steam_depot/${{ matrix.steam_depot }}/ 2>/dev/null || true
        shell: bash
        continue-on-error: true

      - name: Upload standalone artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.artifact_name }}.tar.gz
            dist/${{ matrix.artifact_name }}.zip
          if-no-files-found: warn

      - name: Upload Steam depot artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-depot-${{ matrix.steam_depot }}
          path: steam_depot/${{ matrix.steam_depot }}/
          if-no-files-found: warn

  # ===========================================================================
  # Run Tests on Built Artifacts
  # ===========================================================================
  test-artifacts:
    name: Test Artifacts
    needs: [build-wheels]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-linux-x64
          path: dist/
        continue-on-error: true

      - name: Install wheel
        run: |
          pip install dist/*.whl 2>/dev/null || echo "No wheel found, skipping"
          pip install pytest numpy
        continue-on-error: true

      - name: Run smoke tests
        run: |
          python -c "
          try:
              import procengine_cpp as cpp

              # Test SeedRegistry
              reg = cpp.SeedRegistry(42)
              assert reg.root_seed() == 42
              print('SeedRegistry: OK')

              # Test Engine
              engine = cpp.Engine(12345)
              print('Engine: OK')

              # Test terrain generation
              height, biome, river = cpp.generate_terrain_standalone(42, 32)
              assert height.shape == (32, 32)
              print('Terrain: OK')

              # Test physics
              world = cpp.PhysicsWorld()
              body = cpp.RigidBody(cpp.Vec2(0, 0), cpp.Vec2(1, 0), 1.0, 0.5)
              world.add_body(body)
              print('Physics: OK')

              # Test props
              rock = cpp.RockDescriptor()
              rock.position = cpp.Vec3(0, 0, 0)
              rock.radius = 1.0
              mesh = cpp.generate_rock_mesh(rock)
              assert mesh.vertex_count() > 0
              print('Props: OK')

              # Test materials
              shader = cpp.create_noise_material(42, 1.0)
              print('Materials: OK')

              print('All smoke tests passed!')
          except ImportError:
              print('C++ module not available, skipping smoke tests')
          except Exception as e:
              print(f'Smoke test warning: {e}')
          "
        continue-on-error: true

  # ===========================================================================
  # Create GitHub Release with Steam-Ready Artifacts
  # ===========================================================================
  create-release:
    name: Create Release
    needs: [build-wheels, build-standalone, test-artifacts]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
        continue-on-error: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts/ -type f 2>/dev/null | head -100 || echo "No artifacts"

      - name: Prepare Steam depot bundle
        run: |
          mkdir -p steam_bundle
          
          # Combine all platform depots into single bundle
          for platform in linux windows macos; do
            if [ -d "artifacts/steam-depot-$platform" ]; then
              mkdir -p steam_bundle/depot_$platform
              cp -r artifacts/steam-depot-$platform/* steam_bundle/depot_$platform/
            fi
          done
          
          # Create Steam app manifest template
          cat > steam_bundle/app_build.vdf << 'EOF'
          "AppBuild"
          {
              "AppID" "YOUR_APP_ID"
              "Desc" "Procedural Engine v${{ steps.version.outputs.VERSION }}"
              "BuildOutput" "./output/"
              "ContentRoot" "./"
              "SetLive" ""
              "Depots"
              {
                  "YOUR_WINDOWS_DEPOT_ID"
                  {
                      "FileMapping"
                      {
                          "LocalPath" "./depot_windows/*"
                          "DepotPath" "."
                          "recursive" "1"
                      }
                  }
                  "YOUR_LINUX_DEPOT_ID"
                  {
                      "FileMapping"
                      {
                          "LocalPath" "./depot_linux/*"
                          "DepotPath" "."
                          "recursive" "1"
                      }
                  }
                  "YOUR_MACOS_DEPOT_ID"
                  {
                      "FileMapping"
                      {
                          "LocalPath" "./depot_macos/*"
                          "DepotPath" "."
                          "recursive" "1"
                      }
                  }
              }
          }
          EOF
          
          # Create Steam README
          cat > steam_bundle/STEAM_DEPLOYMENT.md << 'EOF'
          # Steam Deployment Guide
          
          This bundle contains all platform builds ready for Steam deployment.
          
          ## Directory Structure
          - `depot_linux/` - Linux build
          - `depot_windows/` - Windows build  
          - `depot_macos/` - macOS build
          - `app_build.vdf` - Steam app build manifest template
          
          ## Deployment Steps
          1. Replace YOUR_APP_ID with your Steam App ID
          2. Replace depot IDs with your actual depot IDs
          3. Run: `steamcmd +login <username> +run_app_build app_build.vdf +quit`
          
          ## Testing
          Use Steam's partner tools to test the builds before release.
          EOF
          
          # Create archive
          tar -czvf steam_bundle.tar.gz steam_bundle/
        continue-on-error: true

      - name: Generate release notes
        id: notes
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cat << EOF > release_notes.md
          ## Procedural Engine v${VERSION}

          A hybrid Python/C++ procedural world generation engine with Vulkan graphics.

          ### Features
          - 100% deterministic procedural generation from a single root seed
          - Terrain generation with hydraulic erosion, biomes, and rivers
          - Procedural props: rocks, trees (L-systems), buildings (BSP), creatures (metaballs)
          - Material graph compiler (GLSL/SPIR-V)
          - 3D Physics with hybrid 2D+height approach
          - Hot-reload infrastructure for live editing
          - Full Vulkan rendering pipeline

          ### Downloads

          **Standalone Executables (recommended for end users):**
          - \`ProceduralEngine-Windows-x64.zip\` - Windows 10/11 (64-bit)
          - \`ProceduralEngine-Linux-x64.tar.gz\` - Linux (64-bit)
          - \`ProceduralEngine-macOS-x64.tar.gz\` - macOS (64-bit)

          **Python Wheels (for developers):**
          - \`wheel-windows-x64\` - Windows Python wheel
          - \`wheel-linux-x64\` - Linux Python wheel
          - \`wheel-macos-x64\` - macOS Python wheel

          Install with: \`pip install procedural_engine-*.whl\`

          **Steam Deployment:**
          - \`steam_bundle.tar.gz\` - Pre-configured depot structure for Steamworks

          ### Requirements
          - **Standalone:** Vulkan-compatible GPU
          - **Python:** Python 3.10+ with NumPy

          ### Quick Start
          \`\`\`bash
          # Standalone
          ./ProceduralEngine --seed 42 --size 128

          # Python
          import procengine_cpp as engine
          reg = engine.SeedRegistry(42)
          height, biome, river = engine.generate_terrain_standalone(42, 64)
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          name: Procedural Engine v${{ steps.version.outputs.VERSION }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') || contains(steps.version.outputs.VERSION, 'rc') }}
          files: |
            artifacts/wheel-*/*.whl
            artifacts/ProceduralEngine-*/*.tar.gz
            artifacts/ProceduralEngine-*/*.zip
            steam_bundle.tar.gz
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
